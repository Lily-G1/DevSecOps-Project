apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  labels:
    app: backend
stringData:
  DB_PASSWORD: Aditya
  JWT_SECRET: devopsShackSuperSecretKey
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  labels:
    app: backend
data:
  DB_HOST: mysql
  DB_USER: root
  DB_NAME: crud_app
  RESET_ADMIN_PASS: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
