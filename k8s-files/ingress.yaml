---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: prod
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    #nginx.ingress.kubernetes.io/rewrite-target: /$2
    #nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: liliangaladima.online
      http:
        paths:
          - path: /api  #(/|$)(.*)
            pathType: Prefix  #ImplementationSpecific
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /  #(.*)
            pathType: Prefix  #ImplementationSpecific
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: www.liliangaladima.online
      http:
        paths:
          - path: /api   #(/|$)(.*)
            pathType: Prefix  #ImplementationSpecific
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /  #(.*)
            pathType: Prefix  #ImplementationSpecific
            backend:
              service:
                name: frontend
                port:
                  number: 80
  tls:
    - hosts:
        - liliangaladima.online
        - www.liliangaladima.online
      secretName: liliangaladima-co-tls
